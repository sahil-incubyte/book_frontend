query GetBooks(
  $search: String
  $minPrice: Int
  $maxPrice: Int
  $sortBy: BookSortField
  $sortDirection: SortDirection
) {
  books(
    search: $search
    minPrice: $minPrice
    maxPrice: $maxPrice
    sortBy: $sortBy
    sortDirection: $sortDirection
  ) {
    id
    title
    author
    price
  }
}
